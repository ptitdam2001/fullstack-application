security:
  - jwtAuth: []
components:
  securitySchemes:
    jwtAuth:
      type: "http"
      scheme: "bearer"
      bearerFormat: "JWT"
  schemas:
    RegisterInput:
      type: object
      required:
        - firstName
        - email
        - password
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          nullable: true
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        teamId:
          type: string
          nullable: true
    Count:
      type: integer
      nullable: false
    uuid:
      type: string
      description: The unique ID
      example: abcdef
      format: uuid
    AreaWithoutId:
      properties:
        name:
          type: string
          nullable: false
        address:
          type: string
          nullable: false
          minLength: 1
        city:
          type: string
          nullable: false
          minLength: 1
        longitude:
          type: number
          format: float
          nullable: false
        latitude:
          type: number
          nullable: false
          format: float
      required:
        - _id
        - address
        - city
        - longitude
        - latitude
    Area:
      allOf:
        - $ref: "#/components/schemas/AreaWithoutId"
        - type: object
          required:
            - _id
          properties:
            _id:
              type: string
              format: uuid
    ForgotPassword:
      properties:
        email:
          nullable: false
          type: string
          format: email
      required:
        - email
    Login:
      properties:
        email:
          nullable: false
          type: string
          format: email
        password:
          nullable: false
          type: string
      required:
        - email
        - password
    ActivateAccountInput:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          nullable: false
    ResendActivationInput:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          nullable: false
    ResetPasswordInput:
      type: object
      required:
        - token
        - newPassword
      properties:
        token:
          type: string
          nullable: false
        newPassword:
          type: string
          minLength: 8
          nullable: false
    JoinRequestStatus:
      type: string
      enum:
        - PENDING
        - APPROVED
        - REFUSED
    CreateTeamJoinRequestInput:
      type: object
      required:
        - requestedRole
      properties:
        requestedRole:
          $ref: "#/components/schemas/TeamRole"
    UpdateTeamJoinRequestInput:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum:
            - approve
            - refuse
          nullable: false
    TeamJoinRequest:
      type: object
      required:
        - id
        - userId
        - teamId
        - requestedRole
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          nullable: false
        userId:
          type: string
          nullable: false
        teamId:
          type: string
          nullable: false
        requestedRole:
          $ref: "#/components/schemas/TeamRole"
        status:
          $ref: "#/components/schemas/JoinRequestStatus"
        createdAt:
          type: string
          format: date-time
          nullable: false
        updatedAt:
          type: string
          format: date-time
          nullable: false
    CreateTeamWithCoachInput:
      type: object
      required:
        - name
        - ageCategory
        - color
        - areas
      properties:
        name:
          type: string
          nullable: false
        ageCategory:
          $ref: "#/components/schemas/AgeCategory"
        color:
          type: string
          nullable: false
        areas:
          type: array
          items:
            $ref: "#/components/schemas/AreaWithoutId"
    TeamWithCoachResult:
      type: object
      required:
        - team
        - userTeam
      properties:
        team:
          $ref: "#/components/schemas/Team"
        userTeam:
          $ref: "#/components/schemas/UserTeam"
    TeamRole:
      type: string
      enum:
        - COACH
        - PLAYER
    UserTeam:
      type: object
      required:
        - id
        - userId
        - teamId
        - role
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/TeamRole"
    UserTeamWithTeam:
      type: object
      required:
        - id
        - userId
        - teamId
        - role
        - team
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/TeamRole"
        team:
          type: object
          required:
            - id
            - name
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            color:
              type: string
              nullable: true
    UserMatch:
      type: object
      required:
        - id
        - userId
        - matchId
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        matchId:
          type: string
          format: uuid
    UpdateUserInput:
      properties:
        lastName:
          nullable: false
          type: string
          minLength: 1
        firstName:
          nullable: false
          type: string
          minLength: 1
        email:
          nullable: false
          type: string
          format: email
        avatar:
          type: string
    TeamCurrentGroup:
      type: object
      required:
        - groupId
        - groupName
        - phaseId
        - championshipId
      properties:
        groupId:
          type: string
          format: uuid
        groupName:
          type: string
        phaseId:
          type: string
          format: uuid
        championshipId:
          type: string
          format: uuid

    UserRole:
      type: string
      enum:
        - ADMIN
        - COACH
        - PLAYER
        - REFEREE

    User:
      properties:
        lastName:
          nullable: false
          type: string
          minLength: 1
        firstName:
          nullable: false
          type: string
          minLength: 1
        email:
          nullable: false
          type: string
          format: email
        _id:
          type: string
          format: uuid
        isAdmin:
          type: boolean
          nullable: false
        isActive:
          type: boolean
          nullable: false
        isBlocked:
          type: boolean
          nullable: false
        isReferee:
          type: boolean
          nullable: false
        createdAt:
          nullable: false
          type: string
          format: date-time
        avatar:
          type: string
        roles:
          type: array
          description: Contextual roles derived from team memberships and isReferee flag
          items:
            $ref: "#/components/schemas/UserRole"
      required:
        - _id
        - email
        - lastName
        - firstName
        - isAdmin
        - isActive
        - isBlocked
        - isReferee
    UserWithoutPassword:
      properties:
        lastName:
          nullable: false
          type: string
        firstName:
          nullable: false
          type: "string"
        email:
          nullable: false
          type: "string"
          format: email
        id:
          nullable: false
          type: "string"
          format: uuid
        isAdmin:
          type: boolean
          nullable: false
        isActive:
          type: boolean
          nullable: false
        isBlocked:
          type: boolean
          nullable: false
        isReferee:
          type: boolean
          nullable: false
        createdAt:
          nullable: false
          type: string
          format: date-time
        avatar:
          type: string
        roles:
          type: array
          nullable: false
          items:
            type: string
            enum: [ADMIN, COACH, PLAYER, REFEREE]
          description: Resolved contextual roles of the authenticated user
    TokenData:
      type: object
      required:
        - userId
        - email
        - isAdmin
        - token
      properties:
        userId:
          type: string
          nullable: false
          format: uuid
        email:
          type: string
          format: email
          nullable: false
          example:
            - john@example.com
        isAdmin:
          type: boolean
          nullable: false
        token:
          type: string
          nullable: false
    TeamWithoutId:
      type: object
      properties:
        name:
          type: string
          nullable: false
          minLength: 1
        color:
          nullable: true
          type: string
          example: "#222abb"
          format: color
      required:
        - name
    Team:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          nullable: false
          minLength: 1
        color:
          nullable: true
          type: string
          example: "#222abb"
          format: color
        areas:
          type: array
