---
openapi: "3.1.0"
info:
  version: "1"
  title: ""
  description: ""
paths:
  /me:
    get:
      operationId: me
      tags:
        - Authentication
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithoutPassword"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
  /me/teams:
    get:
      operationId: getMyTeams
      summary: Get all teams of the current authenticated user (all roles)
      tags:
        - UserTeam
      responses:
        "200":
          description: List of UserTeams with embedded team data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserTeamWithTeam"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
  /login:
    post:
      operationId: login
      tags:
        - Authentication
      security: [] # no auth needed
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Login"
      responses:
        "200":
          description: Logged in succesfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenData"
        404:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
  /logout:
    post:
      operationId: logout
      tags:
        - Authentication
      responses:
        200:
          description: succesful current user's Logout
        500:
          description: "Internal error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
  /register:
    post:
      operationId: register
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithoutPassword"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"

  /forgot-password:
    post:
      operationId: forgotPassword
      tags:
        - Authentication
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPassword"
      responses:
        200:
          description: "successful"
        500:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
  /users:
    get:
      operationId: "getUsers"
      tags:
        - Users
      description: ""
      parameters:
        - in: query
          name: page
          schema:
            type: integer
          description: The number of items to skip before starting to collect the result set
        - in: query
          name: limit
          schema:
            type: integer
          description: The numbers of items to return
        - in: query
          name: isActive
          schema:
            type: boolean
          description: Filter by active status (false = inactive/pending activation)
      responses:
        200:
          description: "Get list of users"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/User"
  /user:
    post:
      operationId: "createUser"
      description: ""
      tags:
        - Users
      security: []
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        500:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
  /user/{userId}/player:
    post:
      operationId: createPlayer
      description: Create a player from user
      tags:
        - Team
      parameters:
        - in: "path"
          name: "userId"
          required: true
          schema:
            type: "string"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Player"
      responses:
        200:
          description: "successful"
          content:
            application/json:
              schema:
                type: string
        404:
          description: "User or team does not exist"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"

  /teams:
    get:
      operationId: "getTeams"
      description: "get list of teams"
      tags:
        - Teams
      security: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
          description: The number of items to skip before starting to collect the result set
        - in: query
          name: limit
          schema:
            type: integer
          description: The numbers of items to return
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/Team"
  /teams/count:
    get:
      operationId: countTeams
      description: count the number of teams
      tags:
        - Teams
      security: []
      parameters: []
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Count"
  /team:
    post:
      operationId: "createTeam"
      description: "Create a team. Any authenticated user can create a team and automatically becomes its coach."
      tags:
        - Team
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamWithoutId"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                type: "string"
  /team/{id}:
    delete:
      operationId: "removeTeam"
      description: ""
      tags:
        - Team
      parameters:
        - in: "path"
          name: "id"
          required: true
          schema:
            type: "string"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                type: "string"
    get:
      operationId: "getTeam"
      description: "get a team info"
      tags:
        - Team
      parameters:
        - in: "path"
          name: "id"
          required: true
          schema:
            type: "string"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        404:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
    patch:
      operationId: "updateTeam"
      description: "Update a team. Requires Admin or Coach of the team."
      tags:
        - Team
      parameters:
        - in: "path"
          name: "id"
          required: true
          schema:
            type: "string"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Team"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        403:
          description: "Forbidden — requires Admin or Coach role on this team"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
        404:
          description: "Team not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"

  /team/{teamId}/players:
    get:
      operationId: getTeamPlayers
      description: "Get list of player"
      tags:
        - Teams
      parameters:
        - in: "path"
          name: "teamId"
          required: true
          schema:
            type: "string"
        - in: "query"
          name: "count"
          schema:
            type: "integer"
        - in: "query"
          name: "page"
          schema:
            type: "integer"
      responses:
        200:
          description: "list of player about current team"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/Player"
        404:
          description: "not found team"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
  /team/{teamId}/calendar:
    get:
      operationId: getTeamCalendar
      description: "Get calendar of given team"
      tags:
        - Teams
      parameters:
        - in: "path"
          name: "teamId"
          required: true
          schema:
            type: "string"
        - in: "query"
          name: "count"
          schema:
            type: "integer"
        - in: "query"
          name: "page"
          schema:
            type: "integer"
        - in: "query"
          name: "startDate"
          schema:
            type: "string"
            format: date-time
        - in: "query"
          name: "endDate"
          schema:
            type: "string"
            format: date-time
      responses:
        200:
          description: "games of given team"
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/Game"
        404:
          description: "not found team"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
  /team/{teamId}/player/{userId}:
    post:
      operationId: putUserToTeam
      description: "Set a player to the team"
      tags:
        - Teams
      parameters:
        - in: path
          name: teamId
          required: true
          schema:
            type: string
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        404:
          description: "team or user are not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
        200:
          description: Successful
          content:
            application/json:
              schema:
                type: boolean
  /team/{teamId}/coaches:
    get:
      operationId: getTeamCoaches
      description: "List coaches assigned to a team"
      tags:
        - UserTeam
      parameters:
        - in: path
          name: teamId
          required: true
          schema:
            type: string
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserTeam"
  /team/{teamId}/coach/{userId}:
    post:
      operationId: assignCoach
      description: "Assign a coach to a team"
      tags:
        - UserTeam
      parameters:
        - in: path
          name: teamId
          required: true
          schema:
            type: string
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        201:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserTeam"
        409:
          description: "Coach already assigned to this team"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
    delete:
      operationId: removeCoach
      description: "Remove a coach from a team"
      tags:
        - UserTeam
      parameters:
        - in: path
          name: teamId
          required: true
          schema:
            type: string
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        204:
          description: "Removed"
        404:
          description: "Assignment not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
  /user/{userId}/coach-teams:
    get:
      operationId: getCoachTeams
      description: "List teams managed by a coach"
      tags:
        - UserTeam
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserTeam"
  /match/{matchId}/referees:
