                $ref: "#/components/schemas/ErrorOutput"

  /championships:
    get:
      operationId: getChampionships
      description: "Get list of championships"
      tags:
        - Championship
      security: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: count
          schema:
            type: integer
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                type: array
