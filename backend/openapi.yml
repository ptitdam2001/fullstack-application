            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Game"
        404:
          description: "Not found game"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
        500:
          description: "Internal error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
    delete:
      description: "Delete a game"
      operationId: removeGame
      tags:
