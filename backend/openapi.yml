        - in: query
          name: count
          schema:
            type: integer
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"

  /matches/count:
    get:
      operationId: countMatches
      description: "Count matches"
      tags:
        - Match
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Count"

  /match:
    post:
      operationId: addMatch
      description: "Create a match"
      tags:
        - Match
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchInput"
      responses:
        201:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /match/{id}:
    get:
      operationId: getMatch
      description: "Get a match"
      tags:
        - Match
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
        404:
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
    patch:
      operationId: editMatch
      description: "Update a match"
      tags:
        - Match
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchInput"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
        404:
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
    delete:
      operationId: removeMatch
      description: "Delete a match"
      tags:
        - Match
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        204:
          description: "Deleted"
        404:
          description: "Not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"

security:
  - jwtAuth: []
components:
  securitySchemes:
    jwtAuth:
      type: "http"
      scheme: "bearer"
      bearerFormat: "JWT"
  schemas:
    Count:
      type: integer
      nullable: false
    uuid:
      type: string
      description: The unique ID
      example: abcdef
      format: uuid
    AreaWithoutId:
      properties:
        name:
          type: string
          nullable: false
        address:
          type: string
          nullable: false
          minLength: 1
        city:
          type: string
          nullable: false
          minLength: 1
        longitude:
          type: number
          format: float
          nullable: false
        latitude:
          type: number
          nullable: false
          format: float
      required:
        - _id
        - address
        - city
        - longitude
        - latitude
    Area:
      allOf:
        - $ref: "#/components/schemas/AreaWithoutId"
        - type: object
          required:
            - _id
          properties:
            _id:
              type: string
              format: uuid
    ForgotPassword:
      properties:
        email:
          nullable: false
          type: string
          format: email
      required:
        - email
    Login:
      properties:
        email:
          nullable: false
          type: string
          format: email
        password:
          nullable: false
          type: string
      required:
        - email
        - password
    TeamRole:
      type: string
      enum:
        - COACH
        - PLAYER
    UserTeam:
      type: object
      required:
        - id
        - userId
        - teamId
        - role
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/TeamRole"
    UserMatch:
      type: object
      required:
        - id
        - userId
        - matchId
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        matchId:
          type: string
          format: uuid
    UpdateUserInput:
      properties:
        lastname:
          nullable: false
          type: string
          minLength: 1
        firstname:
          nullable: false
          type: string
          minLength: 1
        email:
          nullable: false
          type: string
          format: email
        avatar:
          type: string
    User:
      properties:
        lastname:
          nullable: false
          type: string
          minLength: 1
        firstname:
          nullable: false
          type: string
          minLength: 1
        email:
          nullable: false
          type: string
          format: email
        _id:
          type: string
          format: uuid
        isAdmin:
          type: boolean
          nullable: false
        createdAt:
          nullable: false
          type: string
          format: date-time
        avatar:
          type: string
      required:
        - _id
        - email
        - lastname
        - firstname
        - isAdmin
    UserWithoutPassword:
      properties:
        lastname:
          nullable: false
          type: string
        firstname:
          nullable: false
          type: "string"
        email:
          nullable: false
          type: "string"
          format: email
        id:
          nullable: false
          type: "string"
          format: uuid
        isAdmin:
          type: boolean
          nullable: false
        createdAt:
          nullable: false
          type: string
          format: date-time
        avatar:
          type: string
    TokenData:
      type: object
      required:
        - userId
        - email
        - isAdmin
        - token
      properties:
        userId:
          type: string
          nullable: false
          format: uuid
        email:
          type: string
          format: email
          nullable: false
          example:
            - john@example.com
        isAdmin:
          type: boolean
          nullable: false
        token:
          type: string
          nullable: false
    TeamWithoutId:
      type: object
      properties:
        name:
          type: string
          nullable: false
          minLength: 1
        color:
          nullable: true
          type: string
          example: "#222abb"
          format: color
      required:
        - name
    Team:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          nullable: false
          minLength: 1
        color:
          nullable: true
          type: string
          example: "#222abb"
          format: color
        areas:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/Area"
      required:
        - id
        - name
        - areas
    Player:
      type: object
      properties:
        id:
          type: string
          nullable: false
          format: uuid
        userId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        jersey:
          type: integer
          nullable: true
        position:
          type: string
          nullable: true
      required:
        - id
        - userId
        - teamId
    GameTeam:
      allOf:
        - $ref: "#/components/schemas/Team"
        - type: object
          required:
            - score
          properties:
            score:
              type: integer
              format: score
              default: 0
              minimum: 0
              nullable: false

    Game:
      type: object
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          nullable: true
          format: date-time
        area:
          $ref: "#/components/schemas/Area"
        teams:
          type: "array"
          minItems: 2
          maxItems: 2
          items:
            $ref: "#/components/schemas/GameTeam"
      required:
        - id
        - teams

    ErrorOutput:
      properties:
        status:
          nullable: false
          type: "number"
        message:
          nullable: false
          type: "string"

    MatchTeam:
      type: object
      required:
        - teamId
        - score
      properties:
        teamId:
          type: string
          format: uuid
        score:
          type: integer
          default: 0

    MatchArea:
      type: object
      required:
        - id
        - address
        - city
        - longitude
        - latitude
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
        address:
          type: string
        city:
          type: string
        longitude:
          type: number
          format: float
        latitude:
          type: number
          format: float

    MatchInput:
      type: object
      properties:
        date:
          type: string
          format: date-time
          nullable: true
        area:
          $ref: "#/components/schemas/MatchArea"
        teams:
          type: array
          items:
            $ref: "#/components/schemas/MatchTeam"
      required:
        - area
        - teams

    Match:
      allOf:
        - $ref: "#/components/schemas/MatchInput"
        - type: object
          required:
            - id
          properties:
            id:
              type: string
              format: uuid

    AgeCategory:
      type: string
      enum:
        - U9
        - U11
        - U13
        - U15
        - U18
        - Senior

    PointsConfig:
      type: object
      required:
        - win
        - draw
        - loss
        - forfeit
      properties:
        win:
          type: integer
        draw:
          type: integer
        loss:
          type: integer
        forfeit:
          type: integer

    ChampionshipInput:
      type: object
      required:
        - ageCategory
        - season
        - pointsConfig
      properties:
        name:
          type: string
          nullable: true
        ageCategory:
          $ref: "#/components/schemas/AgeCategory"
        season:
          type: string
        startDate:
          type: string
          format: date-time
          nullable: true
        endDate:
          type: string
          format: date-time
          nullable: true
        pointsConfig:
          $ref: "#/components/schemas/PointsConfig"

    Championship:
      allOf:
        - $ref: "#/components/schemas/ChampionshipInput"
        - type: object
          required:
            - id
          properties:
            id:
              type: string
              format: uuid
