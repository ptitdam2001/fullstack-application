                  $ref: "#/components/schemas/UserMatch"
  /match/{matchId}/referee/{userId}:
    post:
      operationId: assignReferee
      description: "Assign a referee to a match"
      tags:
        - UserMatch
      parameters:
        - in: path
          name: matchId
          required: true
          schema:
            type: string
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        201:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMatch"
        409:
          description: "Referee already assigned to this match"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
    delete:
      operationId: removeReferee
      description: "Remove a referee from a match"
      tags:
        - UserMatch
      parameters:
        - in: path
          name: matchId
          required: true
          schema:
            type: string
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        204:
          description: "Removed"
        404:
          description: "Assignment not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
  /user/{userId}/referee-matches:
    get:
      operationId: getUserMatches
      description: "List matches where a user is referee"
      tags:
        - UserMatch
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserMatch"
  /user/{id}:
    delete:
      operationId: "removeUser"
      description: ""
      tags:
        - Users
      parameters:
        - in: "path"
          name: "id"
          required: true
          schema:
            type: "string"

      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                type: "boolean"
        404:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
    patch:
      operationId: "updateUser"
      description: ""
      tags:
        - Users
      parameters:
        - in: "path"
          name: "id"
          required: true
          schema:
            type: "string"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserInput"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        404:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
  /users/{id}:
    get:
      operationId: "getUser"
      description: ""
      tags:
        - Users
      parameters:
        - in: "path"
          name: "id"
          required: true
          schema:
            type: "string"
      responses:
        200:
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        403:
          description: "Bad Request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
        404:
          description: "Not found user"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorOutput"
  /areas:
    get:
      operationId: "getAreaList"
      description: "get list of areas"
      tags:
        - Area
      parameters:
        - in: query
          name: page
          schema:
            type: integer
          description: The number of items to skip before starting to collect the result set
        - in: query
          name: limit
          schema:
            type: integer
          description: The numbers of items to return
      responses:
        200:
          description: ""
