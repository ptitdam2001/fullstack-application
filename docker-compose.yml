services:
  swagger-editor:
    image: swaggerapi/swagger-editor:v5.0.0-alpha.98-unprivileged
    container_name: "swagger-editor-container"
    ports:
      - "8081:8080"
  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: "swagger-ui-container"
    ports:
      - "8082:8080"
    volumes:
      - ./backend/openapi.yml:/openapi.yml
    environment:
      SWAGGER_JSON: /openapi.yml
  mongodb:
    image: prismagraphql/mongo-single-replica:4.4.3-bionic
    env_file:
      - ./backend/openapi-express-ts/.env
    environment:
      MONGO_INITDB_DATABASE: app
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      INIT_WAIT_SEC: 3
    ports:
      - "27017:27017"
  db-viewer:
    image: mongo-express
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8083:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongodb:27017/app?authSource=admin&directConnection=true
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "4000:3000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: mongodb://root:example@mongodb:27017/app?authSource=admin&directConnection=true
    depends_on:
      - mongodb
  front:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - 3000:80
    # volumes:
    # - ./frontend:/app
    environment:
      - NODE_ENV=development
