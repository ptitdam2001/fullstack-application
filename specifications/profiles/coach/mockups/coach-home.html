<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coach — Tableau de bord</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
  :root {
    --background: oklch(1 0 0);
    --foreground: oklch(0.145 0 0);
    --card: oklch(1 0 0);
    --card-foreground: oklch(0.145 0 0);
    --primary: oklch(0.205 0 0);
    --primary-foreground: oklch(0.985 0 0);
    --secondary: oklch(0.97 0 0);
    --muted: oklch(0.97 0 0);
    --muted-foreground: oklch(0.556 0 0);
    --accent-bg: oklch(0.97 0 0);
    --border: oklch(0.922 0 0);
    --input: oklch(0.922 0 0);
    --ring: oklch(0.87 0 0);
    --destructive: oklch(0.577 0.245 27.325);
    --sidebar: oklch(0.985 0 0);
    --sidebar-foreground: oklch(0.145 0 0);
    --sidebar-border: oklch(0.922 0 0);
    --sidebar-accent: oklch(0.97 0 0);
    --brand: oklch(0.646 0.222 41.116);
    --brand-soft: oklch(0.93 0.06 41);
    --success: oklch(0.6 0.14 145);
    --radius: 0.625rem;
  }
  .dark {
    --background: oklch(0.145 0 0);
    --foreground: oklch(0.985 0 0);
    --card: oklch(0.205 0 0);
    --card-foreground: oklch(0.985 0 0);
    --primary: oklch(0.985 0 0);
    --primary-foreground: oklch(0.205 0 0);
    --secondary: oklch(0.269 0 0);
    --muted: oklch(0.269 0 0);
    --muted-foreground: oklch(0.708 0 0);
    --accent-bg: oklch(0.269 0 0);
    --border: oklch(0.269 0 0);
    --input: oklch(0.269 0 0);
    --ring: oklch(0.439 0 0);
    --sidebar: oklch(0.205 0 0);
    --sidebar-foreground: oklch(0.985 0 0);
    --sidebar-border: oklch(0.269 0 0);
    --sidebar-accent: oklch(0.269 0 0);
    --brand-soft: oklch(0.3 0.08 41);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--background);
    color: var(--foreground);
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    font-feature-settings: 'cv11', 'ss01';
    -webkit-font-smoothing: antialiased;
  }

  /* App shell ---------------------------------------------------- */
  .app {
    display: grid;
    grid-template-columns: 256px 1fr;
    min-height: 100vh;
    transition: grid-template-columns 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .app.collapsed { grid-template-columns: 64px 1fr; }

  /* Sidebar */
  .sidebar {
    background: var(--sidebar);
    color: var(--sidebar-foreground);
    border-right: 1px solid var(--sidebar-border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: sticky;
    top: 0;
  }
  .sb-header {
    padding: 0 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--sidebar-border);
    height: 60px;
    position: relative;
  }
  .tb-collapse {
    width: 32px; height: 32px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--muted-foreground);
    cursor: pointer;
    display: grid; place-items: center;
    transition: background 0.12s, color 0.12s;
    flex-shrink: 0;
  }
  .tb-collapse:hover { background: var(--secondary); color: var(--foreground); }
  .app.collapsed .sb-brand { display: none; }
  .app.collapsed .sb-header { justify-content: center; padding: 0; }
  .app.collapsed .sb-logo { margin: 0 auto; }
  @media (max-width: 768px) { .tb-collapse { display: none; } }
  .sb-logo {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--primary);
    color: var(--primary-foreground);
    display: grid; place-items: center;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.02em;
  }
  .sb-brand {
    font-weight: 600;
    font-size: 14px;
    letter-spacing: -0.01em;
  }
  .sb-brand small {
    display: block;
    font-weight: 400;
    color: var(--muted-foreground);
    font-size: 11px;
    letter-spacing: 0;
  }
  .sb-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .app.collapsed .sb-scroll { padding: 12px 6px; }
  .app.collapsed .sb-group-label { opacity: 0; height: 1px; padding: 0; overflow: hidden; pointer-events: none; }
  .app.collapsed .sb-group { gap: 4px; }
  .app.collapsed .sb-group + .sb-group { border-top: 1px solid var(--sidebar-border); padding-top: 10px; }
  .app.collapsed .sb-item {
    justify-content: center;
    padding: 9px 0;
    width: 44px;
    margin: 0 auto;
    position: relative;
  }
  .app.collapsed .sb-item .sb-label,
  .app.collapsed .sb-item .sb-cat { display: none; }
  .app.collapsed .sb-item.active::before { left: -6px; top: 8px; bottom: 8px; }
  .app.collapsed .sb-item[data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute;
    left: calc(100% + 12px);
    top: 50%;
    transform: translateY(-50%);
    background: var(--primary);
    color: var(--primary-foreground);
    padding: 5px 9px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
    box-shadow: 0 4px 12px oklch(0 0 0 / 0.15);
  }
  .sb-group { display: flex; flex-direction: column; gap: 2px; }
  .sb-group-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted-foreground);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 6px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sb-group-action {
    width: 20px; height: 20px;
    display: grid; place-items: center;
    border-radius: 4px;
    cursor: pointer;
    color: var(--muted-foreground);
    border: none;
    background: transparent;
  }
  .sb-group-action:hover { background: var(--sidebar-accent); color: var(--foreground); }

  .sb-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: var(--sidebar-foreground);
    text-decoration: none;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: inherit;
    transition: background 0.12s, color 0.12s;
    position: relative;
  }
  .sb-item:hover { background: var(--sidebar-accent); }
  .sb-item.active {
    background: var(--sidebar-accent);
    font-weight: 500;
  }
  .sb-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 8px; bottom: 8px;
    width: 2px;
    background: var(--primary);
    border-radius: 1px;
  }
  .sb-item-icon {
    width: 16px; height: 16px;
    flex-shrink: 0;
    color: var(--muted-foreground);
  }
  .sb-item.active .sb-item-icon { color: var(--foreground); }
  .sb-team-mark {
    width: 22px; height: 22px;
    border-radius: 5px;
    display: grid; place-items: center;
    font-weight: 600;
    font-size: 10px;
    flex-shrink: 0;
    border: 1px solid var(--sidebar-border);
    background: var(--background);
    color: var(--foreground);
    letter-spacing: -0.02em;
  }
  .sb-team-mark.brand { background: var(--brand); color: white; border-color: transparent; }
  .sb-team-mark.dark { background: var(--primary); color: var(--primary-foreground); border-color: transparent; }
  .sb-item .sb-cat {
    margin-left: auto;
    font-size: 10px;
    font-weight: 500;
    color: var(--muted-foreground);
    background: var(--sidebar-accent);
    padding: 1px 6px;
    border-radius: 4px;
  }
  .sb-item.active .sb-cat { background: var(--background); }
  .sb-footer {
    padding: 10px 8px;
    border-top: 1px solid var(--sidebar-border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .app.collapsed .sb-footer { justify-content: center; padding: 10px 6px; }
  .app.collapsed .sb-user-info { display: none; }
  .app.collapsed .sb-user { padding: 4px; flex: 0; }
  .sb-user {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px;
    border-radius: 6px;
    flex: 1;
    cursor: pointer;
  }
  .sb-user:hover { background: var(--sidebar-accent); }
  .sb-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--brand-soft);
    color: var(--brand);
    display: grid; place-items: center;
    font-weight: 600;
    font-size: 11px;
  }
  .sb-user-info { flex: 1; min-width: 0; }
  .sb-user-name { font-size: 12px; font-weight: 500; }
  .sb-user-email { font-size: 11px; color: var(--muted-foreground); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Main */
  main { min-width: 0; display: flex; flex-direction: column; }

  .topbar {
    height: 60px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    background: var(--background);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .crumbs {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted-foreground);
  }
  .crumbs strong {
    color: var(--foreground);
    font-weight: 500;
  }
  .crumb-sep { opacity: 0.5; }
  .topbar-search {
    flex: 1;
    max-width: 360px;
    margin-left: auto;
    position: relative;
  }
  .topbar-search input {
    width: 100%;
    height: 34px;
    padding: 0 12px 0 34px;
    background: var(--secondary);
    border: 1px solid transparent;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    color: var(--foreground);
    outline: none;
    transition: background 0.12s, border-color 0.12s;
  }
  .topbar-search input:focus {
    background: var(--background);
    border-color: var(--ring);
  }
  .topbar-search input::placeholder { color: var(--muted-foreground); }
  .topbar-search .icon {
    position: absolute;
    left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--muted-foreground);
    pointer-events: none;
  }
  .topbar-search kbd {
    position: absolute;
    right: 8px; top: 50%; transform: translateY(-50%);
    font-family: inherit;
    font-size: 10px;
    color: var(--muted-foreground);
    background: var(--background);
    padding: 2px 5px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  .icon-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--background);
    display: grid; place-items: center;
    cursor: pointer;
    color: var(--muted-foreground);
    transition: background 0.12s, color 0.12s;
    position: relative;
  }
  .icon-btn:hover { background: var(--secondary); color: var(--foreground); }
  .icon-btn .dot {
    position: absolute;
    top: 7px; right: 7px;
    width: 7px; height: 7px;
    background: var(--brand);
    border-radius: 50%;
    border: 2px solid var(--background);
  }
  .mobile-trigger { display: none; }

  /* Content */
  .content {
    padding: 24px;
    max-width: 1320px;
    width: 100%;
    margin: 0 auto;
    flex: 1;
  }
  .page-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .page-head h1 {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .page-head .sub {
    font-size: 13px;
    color: var(--muted-foreground);
    margin-top: 4px;
  }
  .page-head-actions { display: flex; gap: 8px; }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    height: 36px;
    padding: 0 14px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background 0.12s, border-color 0.12s, color 0.12s, transform 0.06s;
    white-space: nowrap;
  }
  .btn:active { transform: translateY(0.5px); }
  .btn-primary {
    background: var(--primary);
    color: var(--primary-foreground);
  }
  .btn-primary:hover { background: oklch(from var(--primary) calc(l + 0.05) c h); }
  .dark .btn-primary:hover { background: oklch(from var(--primary) calc(l - 0.05) c h); }
  .btn-outline {
    background: var(--background);
    color: var(--foreground);
    border-color: var(--border);
  }
  .btn-outline:hover { background: var(--secondary); }
  .btn-ghost {
    background: transparent;
    color: var(--foreground);
  }
  .btn-ghost:hover { background: var(--secondary); }
  .btn-sm { height: 30px; padding: 0 10px; font-size: 12px; }
  .btn svg { width: 14px; height: 14px; }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .stat-label {
    font-size: 12px;
    color: var(--muted-foreground);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-label svg { width: 14px; height: 14px; }
  .stat-value {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .stat-value small { font-size: 14px; font-weight: 500; color: var(--muted-foreground); }
  .stat-delta {
    font-size: 11px;
    color: var(--muted-foreground);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .stat-delta.up { color: var(--success); }
  .stat-delta svg { width: 11px; height: 11px; }

  /* Two-column */
  .two-col {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 16px;
  }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-head {
    padding: 16px 18px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .card-desc {
    font-size: 12px;
    color: var(--muted-foreground);
    margin-top: 2px;
  }
  .card-body { padding: 0 6px 6px; }

  /* Tabs */
  .tabs {
    display: inline-flex;
    background: var(--secondary);
    border-radius: 7px;
    padding: 2px;
    gap: 1px;
  }
  .tab {
    border: none;
    background: transparent;
    color: var(--muted-foreground);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 11px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .tab:hover { color: var(--foreground); }
  .tab.on { background: var(--background); color: var(--foreground); box-shadow: 0 1px 2px rgb(0 0 0 / 0.04); }

  /* Agenda list */
  .agenda-month {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 6px;
    margin-top: 4px;
  }
  .agenda-month:first-child { margin-top: 0; }
  .agenda-month-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted-foreground);
  }
  .agenda-month-count {
    font-size: 11px;
    color: var(--muted-foreground);
  }
  .agenda-row {
    display: grid;
    grid-template-columns: 50px 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 10px 14px;
    margin: 0 4px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .agenda-row:hover { background: var(--secondary); }
  .ag-date {
    text-align: center;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 4px 0;
    background: var(--background);
  }
  .ag-date .d {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .ag-date .m {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted-foreground);
    font-weight: 500;
  }
  .ag-meta { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .ag-team {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ag-info {
    font-size: 12px;
    color: var(--muted-foreground);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ag-info svg { width: 11px; height: 11px; }
  .ag-time {
    font-size: 12px;
    font-weight: 600;
    color: var(--foreground);
    white-space: nowrap;
  }
  .ag-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
    background: var(--secondary);
    color: var(--muted-foreground);
  }
  .ag-badge.dom { background: var(--brand-soft); color: var(--brand); }

  /* Teams grid (within main) */
  .teams-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 8px;
  }
  .team-tile {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
    background: var(--background);
    position: relative;
  }
  .team-tile:hover { border-color: oklch(from var(--ring) l c h / 0.6); background: var(--secondary); }
  .team-tile-mark {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: grid; place-items: center;
    font-weight: 600;
    font-size: 12px;
    flex-shrink: 0;
    background: var(--secondary);
    color: var(--foreground);
    letter-spacing: -0.02em;
  }
  .team-tile-mark.brand { background: var(--brand); color: white; }
  .team-tile-mark.dark { background: var(--primary); color: var(--primary-foreground); }
  .team-tile-info { min-width: 0; flex: 1; }
  .team-tile-name { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
  .team-tile-meta {
    font-size: 11px;
    color: var(--muted-foreground);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .kebab-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--muted-foreground);
    cursor: pointer;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .kebab-btn:hover { background: var(--secondary); color: var(--foreground); }

  /* Activity */
  .activity-row {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 10px 14px;
    margin: 0 4px;
    border-radius: 8px;
  }
  .activity-row:hover { background: var(--secondary); }
  .act-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: grid; place-items: center;
    background: var(--secondary);
    color: var(--muted-foreground);
  }
  .act-icon.win { background: oklch(0.95 0.05 145); color: var(--success); }
  .dark .act-icon.win { background: oklch(0.25 0.05 145); }
  .act-icon.warn { background: var(--brand-soft); color: var(--brand); }
  .act-text { font-size: 13px; line-height: 1.4; }
  .act-text small { display: block; font-size: 11px; color: var(--muted-foreground); margin-top: 1px; }
  .act-meta { font-size: 11px; color: var(--muted-foreground); white-space: nowrap; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted-foreground);
    font-size: 13px;
  }

  /* Dialog */
  .dialog-overlay {
    position: fixed; inset: 0;
    background: oklch(0 0 0 / 0.5);
    backdrop-filter: blur(2px);
    z-index: 50;
    display: grid;
    place-items: center;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .dialog {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: 0 12px 40px oklch(0 0 0 / 0.18);
    animation: slideUp 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .dialog h2 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .dialog p {
    font-size: 13px;
    color: var(--muted-foreground);
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .form-row label { font-size: 12px; font-weight: 500; }
  .form-row input, .form-row select {
    height: 34px;
    padding: 0 10px;
    background: var(--background);
    border: 1px solid var(--input);
    border-radius: 7px;
    font-family: inherit;
    font-size: 13px;
    color: var(--foreground);
    outline: none;
    transition: border-color 0.12s, box-shadow 0.12s;
  }
  .form-row input:focus, .form-row select:focus {
    border-color: var(--ring);
    box-shadow: 0 0 0 3px oklch(from var(--ring) l c h / 0.3);
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .dialog-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
  }

  /* Dropdown */
  .dropdown {
    position: absolute;
    top: 100%; right: 0;
    margin-top: 4px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 8px 24px oklch(0 0 0 / 0.08);
    z-index: 30;
    min-width: 180px;
    padding: 4px;
    animation: slideUp 0.12s ease;
  }
  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: 5px;
    font-size: 13px;
    cursor: pointer;
    color: var(--foreground);
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: inherit;
  }
  .dropdown-item:hover { background: var(--secondary); }
  .dropdown-item svg { width: 14px; height: 14px; color: var(--muted-foreground); }
  .dropdown-item.danger { color: var(--destructive); }
  .dropdown-item.danger svg { color: var(--destructive); }
  .dropdown-sep {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: var(--primary);
    color: var(--primary-foreground);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    box-shadow: 0 8px 24px oklch(0 0 0 / 0.18);
    z-index: 100;
    animation: toastIn 0.2s ease;
    display: flex; align-items: center; gap: 8px;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, 12px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  /* Mobile drawer */
  .drawer-overlay {
    position: fixed; inset: 0;
    background: oklch(0 0 0 / 0.5);
    z-index: 40;
    display: none;
  }

  /* Responsive */
  @media (max-width: 1024px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .two-col { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 280px;
      transform: translateX(-100%);
      transition: transform 0.2s ease;
      z-index: 50;
      height: 100vh;
    }
    .sidebar.open { transform: translateX(0); }
    .drawer-overlay.open { display: block; }
    .mobile-trigger { display: grid; }
    .topbar-search { max-width: 100%; }
    .topbar-search kbd { display: none; }
    .crumbs { display: none; }
    .teams-grid { grid-template-columns: 1fr; }
    .stats { grid-template-columns: 1fr 1fr; }
    .content { padding: 16px; }
    .page-head h1 { font-size: 20px; }
  }
</style>
</head>
